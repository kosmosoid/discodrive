services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    env_file: .env
    volumes:
      - ./data:/data
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # data is also mounted into nginx (read-only) for zero-copy X-Accel serving
      - ./data:/data:ro
      # dev TLS (mkcert): Apple clients only send Basic auth over HTTPS
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      - app

volumes:
  pgdata:
