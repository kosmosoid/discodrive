services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    env_file: .env
    volumes:
      - ./data:/data
    expose:
      - "${APP_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    # APP_PORT is substituted into default.conf.template by the image's envsubst step.
    # The filter restricts substitution to APP_PORT so nginx vars ($host, $scheme, …) survive.
    environment:
      APP_PORT: "${APP_PORT:-8080}"
      NGINX_ENVSUBST_FILTER: "^APP_PORT$$"
    volumes:
      - ./deploy/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      # data is also mounted into nginx (read-only) for zero-copy X-Accel serving
      - ./data:/data:ro
      # dev TLS (mkcert): Apple clients only send Basic auth over HTTPS
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    depends_on:
      - app

volumes:
  pgdata:
