version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"          # sqlc reads *.up.sql; .down.sql files are ignored
    queries: "internal/db/queries"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
